<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, &#39;Times New Roman&#39;, serif">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1"></stop>
      <stop offset="50%" style="stop-color:#D4A017;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#A07810;stop-opacity:1"></stop>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#D4A017;stop-opacity:1"></stop>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="600" height="300" fill="#0A0A0A"></rect>

  
  <line x1="0" y1="150" x2="600" y2="150" stroke="#1a1a1a" stroke-width="1"></line>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1a1a1a" stroke-width="1"></line>

  
  
  <polygon points="120,60 162,84 162,132 120,156 78,132 78,84" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"></polygon>
  
  <polygon points="120,76 150,93 150,127 120,144 90,127 90,93" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.25"></polygon>

  
  
  <circle cx="110" cy="118" r="26" fill="url(#bodyGrad)" stroke="url(#goldGrad)" stroke-width="1.8"></circle>
  <circle cx="130" cy="112" r="22" fill="url(#bodyGrad)" stroke="url(#goldGrad)" stroke-width="1.8"></circle>
  <circle cx="122" cy="100" r="20" fill="url(#bodyGrad)" stroke="url(#goldGrad)" stroke-width="1.8"></circle>
  <circle cx="104" cy="103" r="18" fill="url(#bodyGrad)" stroke="url(#goldGrad)" stroke-width="1.8"></circle>

  
  <ellipse cx="117" cy="112" rx="28" ry="22" fill="#0f0f0f"></ellipse>

  
  <ellipse cx="148" cy="96" rx="14" ry="13" fill="#111" stroke="url(#goldGrad)" stroke-width="1.8"></ellipse>

  
  <circle cx="153" cy="93" r="2.5" fill="url(#goldGrad)" filter="url(#subtleGlow)"></circle>
  <circle cx="153" cy="93" r="1" fill="#0A0A0A"></circle>

  
  <ellipse cx="142" cy="85" rx="5" ry="8" fill="#0f0f0f" stroke="url(#goldGrad)" stroke-width="1.4" transform="rotate(-20,142,85)"></ellipse>

  
  <rect x="101" y="133" width="5" height="16" rx="2.5" fill="url(#goldGrad)" opacity="0.7"></rect>
  <rect x="111" y="135" width="5" height="14" rx="2.5" fill="url(#goldGrad)" opacity="0.7"></rect>
  <rect x="122" y="133" width="5" height="16" rx="2.5" fill="url(#goldGrad)" opacity="0.7"></rect>
  <rect x="132" y="135" width="5" height="14" rx="2.5" fill="url(#goldGrad)" opacity="0.7"></rect>

  
  <circle cx="108" cy="110" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)" opacity="0.9"></circle>
  <circle cx="120" cy="105" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)" opacity="0.9"></circle>
  <circle cx="130" cy="115" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)" opacity="0.9"></circle>
  <circle cx="115" cy="120" r="2" fill="url(#goldGrad)" filter="url(#subtleGlow)" opacity="0.9"></circle>

  
  <line x1="108" y1="110" x2="120" y2="105" stroke="url(#goldGrad2)" stroke-width="0.7" opacity="0.5"></line>
  <line x1="120" y1="105" x2="130" y2="115" stroke="url(#goldGrad2)" stroke-width="0.7" opacity="0.5"></line>
  <line x1="108" y1="110" x2="115" y2="120" stroke="url(#goldGrad2)" stroke-width="0.7" opacity="0.5"></line>
  <line x1="130" y1="115" x2="115" y2="120" stroke="url(#goldGrad2)" stroke-width="0.7" opacity="0.5"></line>

  
  <path d="M 136,82 A 18,18 0 0,1 162,96" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6" filter="url(#subtleGlow)"></path>
  <circle cx="162" cy="96" r="2.5" fill="url(#goldGrad)" filter="url(#glow)"></circle>

  
  
  <text x="185" y="122" font-family="&#39;Inter&#39;, &#39;Arial Black&#39;, sans-serif" font-weight="900" font-size="54" letter-spacing="6" fill="url(#goldGrad)" filter="url(#subtleGlow)">BLACK</text>

  
  <text x="185" y="158" font-family="&#39;Inter&#39;, &#39;Arial Black&#39;, sans-serif" font-weight="900" font-size="54" letter-spacing="6" fill="#F0F0F0">SHEEP</text>

  
  <rect x="185" y="128" width="380" height="1.5" fill="url(#goldGrad)" opacity="0.5"></rect>

  
  <text x="187" y="180" font-family="&#39;Inter&#39;, Arial, sans-serif" font-weight="400" font-size="11.5" letter-spacing="5" fill="#888" text-anchor="start">INTELLIGENT AUTOMATION</text>

  
  <circle cx="185" cy="196" r="2" fill="url(#goldGrad)" opacity="0.8"></circle>
  <circle cx="193" cy="196" r="2" fill="url(#goldGrad)" opacity="0.5"></circle>
  <circle cx="201" cy="196" r="2" fill="url(#goldGrad)" opacity="0.3"></circle>
</svg>