<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKSHEEP Intro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif;overflow:hidden}
.stage{position:relative;width:540px;height:540px;background:#0A0A0A;overflow:hidden;border-radius:4px}

/* GRID LINES */
.grid line{stroke:#D4A017;stroke-width:0.5;opacity:0;animation:fadeGrid 0.6s ease forwards}
.grid line:nth-child(1){animation-delay:0.1s}
.grid line:nth-child(2){animation-delay:0.15s}
.grid line:nth-child(3){animation-delay:0.2s}
.grid line:nth-child(4){animation-delay:0.25s}

/* HEXAGONS */
.hex{fill:none;stroke-width:1.5;stroke-dasharray:400;stroke-dashoffset:400;animation:drawHex 1s ease forwards}
.hex1{stroke:#D4A017;opacity:0.25;animation-delay:0.3s}
.hex2{stroke:#D4A017;opacity:0.12;animation-delay:0.5s}

/* SHEEP parts */
.wool{fill:#111;stroke-width:2.5;stroke-dasharray:0;opacity:0;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards}
.wool1{animation-delay:0.8s}
.wool2{animation-delay:0.9s}
.wool3{animation-delay:1.0s}
.wool4{animation-delay:1.05s}
.core{fill:#0d0d0d;opacity:0;animation:fadeIn 0.3s ease forwards;animation-delay:1.1s}
.head{fill:#111;stroke-width:2.5;opacity:0;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;animation-delay:1.15s}
.ear{fill:#0f0f0f;stroke-width:2;opacity:0;animation:popIn 0.3s ease forwards;animation-delay:1.25s}
.eye-ring{opacity:0;animation:glowPop 0.5s ease forwards;animation-delay:1.35s}
.orbit{stroke-dasharray:120;stroke-dashoffset:120;opacity:0;animation:drawOrbit 0.8s ease forwards;animation-delay:1.4s}
.orbit-dot{opacity:0;animation:glowPop 0.4s ease forwards;animation-delay:2.0s}
.leg{opacity:0;animation:slideDown 0.4s ease forwards}
.leg1{animation-delay:1.3s}.leg2{animation-delay:1.35s}.leg3{animation-delay:1.38s}.leg4{animation-delay:1.42s}
.node{opacity:0;animation:glowPop 0.35s ease forwards}
.n1{animation-delay:1.6s}.n2{animation-delay:1.7s}.n3{animation-delay:1.8s}.n4{animation-delay:1.75s}
.circuit{stroke-dasharray:80;stroke-dashoffset:80;opacity:0;animation:drawCircuit 0.5s ease forwards}
.c1{animation-delay:1.85s}.c2{animation-delay:1.95s}.c3{animation-delay:2.0s}.c4{animation-delay:2.05s}

/* TEXT */
.black-txt{opacity:0;transform:translateX(-40px);animation:slideRight 0.6s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:2.1s}
.sheep-txt{opacity:0;transform:translateX(40px);animation:slideLeft 0.6s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:2.3s}
.rule{opacity:0;transform:scaleX(0);animation:expandLine 0.5s ease forwards;animation-delay:2.5s;transform-origin:left}
.tagline{opacity:0;animation:fadeUp 0.5s ease forwards;animation-delay:2.7s}
.url-txt{opacity:0;animation:fadeIn 0.5s ease forwards;animation-delay:3.0s}

/* SCAN LINE */
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,160,23,0.6),transparent);top:-2px;animation:scan 3s ease-in-out infinite;animation-delay:1s;pointer-events:none}

/* GLOW PULSE */
.glow-pulse{animation:pulseGlow 2s ease-in-out infinite;animation-delay:2.5s}

/* REPLAY */
.replay{position:absolute;bottom:14px;right:14px;background:rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.3);color:#D4A017;font-size:11px;letter-spacing:2px;padding:6px 14px;border-radius:3px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all 0.2s;opacity:0;animation:fadeIn 0.5s ease forwards;animation-delay:3.2s}
.replay:hover{background:rgba(212,160,23,0.2)}

/* KEYFRAMES */
@keyframes fadeGrid{to{opacity:1}}
@keyframes drawHex{to{stroke-dashoffset:0}}
@keyframes popIn{0%{opacity:0;transform:scale(0.5)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes glowPop{0%{opacity:0;transform:scale(0)}60%{transform:scale(1.4)}100%{opacity:1;transform:scale(1)}}
@keyframes drawOrbit{0%{opacity:0.7;stroke-dashoffset:120}100%{opacity:0.8;stroke-dashoffset:0}}
@keyframes slideDown{0%{opacity:0;transform:translateY(-20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes drawCircuit{0%{opacity:0.5;stroke-dashoffset:80}100%{opacity:0.55;stroke-dashoffset:0}}
@keyframes slideRight{to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{to{opacity:1;transform:translateX(0)}}
@keyframes expandLine{to{opacity:0.35;transform:scaleX(1)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{top:-2px;opacity:0}10%{opacity:1}90%{opacity:0.6}100%{top:102%;opacity:0}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(212,160,23,0.4))}50%{filter:drop-shadow(0 0 16px rgba(212,160,23,0.8))}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="stage">
  <div class="scanline"></div>

  <svg width="540" height="540" viewBox="0 0 540 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#F5C842"/>
        <stop offset="50%" style="stop-color:#D4A017"/>
        <stop offset="100%" style="stop-color:#A07810"/>
      </linearGradient>
      <radialGradient id="bgGlow" cx="50%" cy="44%" r="45%">
        <stop offset="0%" style="stop-color:rgba(212,160,23,0.1)"/>
        <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
      </radialGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- BG glow -->
    <rect width="540" height="540" fill="url(#bgGlow)"/>

    <!-- Grid -->
    <g class="grid">
      <line x1="0" y1="180" x2="540" y2="180"/>
      <line x1="0" y1="360" x2="540" y2="360"/>
      <line x1="180" y1="0" x2="180" y2="540"/>
      <line x1="360" y1="0" x2="360" y2="540"/>
    </g>

    <!-- Hexagons -->
    <polygon class="hex hex1" points="270,60 360,112 360,218 270,270 180,218 180,112"/>
    <polygon class="hex hex2" points="270,80 348,126 348,218 270,264 192,218 192,126"/>

    <!-- SHEEP -->
    <!-- Wool -->
    <circle class="wool wool1" cx="228" cy="210" r="54" stroke="url(#g)"/>
    <circle class="wool wool2" cx="272" cy="190" r="48" stroke="url(#g)"/>
    <circle class="wool wool3" cx="250" cy="160" r="44" stroke="url(#g)"/>
    <circle class="wool wool4" cx="206" cy="168" r="40" stroke="url(#g)"/>
    <ellipse class="core" cx="238" cy="192" rx="60" ry="50"/>
    <!-- Head -->
    <ellipse class="head" cx="310" cy="148" rx="34" ry="32" stroke="url(#g)" stroke-width="2.5"/>
    <!-- Ear -->
    <ellipse class="ear" cx="288" cy="118" rx="11" ry="18" stroke="url(#g)" stroke-width="2" transform="rotate(-20,288,118)"/>
    <!-- Eye -->
    <g class="eye-ring glow-pulse" filter="url(#glow)">
      <circle cx="322" cy="141" r="7.5" fill="url(#g)"/>
      <circle cx="322" cy="141" r="3.5" fill="#0A0A0A"/>
      <circle cx="322" cy="141" r="1.5" fill="url(#g)"/>
    </g>
    <!-- Orbit -->
    <path class="orbit" d="M 290,108 A 44,44 0 0,1 352,148" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-dasharray="7,5" filter="url(#glow)"/>
    <circle class="orbit-dot" cx="352" cy="148" r="6" fill="url(#g)" filter="url(#glow2)"/>
    <!-- Legs -->
    <rect class="leg leg1" x="194" y="258" width="13" height="40" rx="6.5" fill="url(#g)" opacity="0.8"/>
    <rect class="leg leg2" x="214" y="264" width="13" height="35" rx="6.5" fill="url(#g)" opacity="0.8"/>
    <rect class="leg leg3" x="244" y="258" width="13" height="40" rx="6.5" fill="url(#g)" opacity="0.8"/>
    <rect class="leg leg4" x="264" y="264" width="13" height="35" rx="6.5" fill="url(#g)" opacity="0.8"/>
    <!-- Circuit nodes -->
    <circle class="node n1" cx="214" cy="186" r="6" fill="url(#g)" filter="url(#glow)"/>
    <circle class="node n2" cx="244" cy="172" r="6" fill="url(#g)" filter="url(#glow)"/>
    <circle class="node n3" cx="272" cy="198" r="6" fill="url(#g)" filter="url(#glow)"/>
    <circle class="node n4" cx="232" cy="212" r="6" fill="url(#g)" filter="url(#glow)"/>
    <!-- Circuit lines -->
    <line class="circuit c1" x1="214" y1="186" x2="244" y2="172" stroke="url(#g)" stroke-width="1.4" opacity="0.5"/>
    <line class="circuit c2" x1="244" y1="172" x2="272" y2="198" stroke="url(#g)" stroke-width="1.4" opacity="0.5"/>
    <line class="circuit c3" x1="214" y1="186" x2="232" y2="212" stroke="url(#g)" stroke-width="1.4" opacity="0.5"/>
    <line class="circuit c4" x1="272" y1="198" x2="232" y2="212" stroke="url(#g)" stroke-width="1.4" opacity="0.5"/>

    <!-- WORDMARK -->
    <text class="black-txt" x="60" y="360" font-family="'Inter','Arial Black',sans-serif" font-weight="900" font-size="70" letter-spacing="5" fill="url(#g)">BLACK</text>
    <text class="sheep-txt" x="60" y="430" font-family="'Inter','Arial Black',sans-serif" font-weight="900" font-size="70" letter-spacing="5" fill="#F0F0F0">SHEEP</text>
    <rect class="rule" x="60" y="438" width="420" height="1.5" fill="url(#g)"/>
    <text class="tagline" x="62" y="464" font-family="'Inter',Arial,sans-serif" font-size="13" letter-spacing="7" fill="#666">INTELLIGENT AUTOMATION</text>
    <text class="url-txt" x="62" y="494" font-family="'Inter',Arial,sans-serif" font-size="12" letter-spacing="4" fill="#3a3a3a">black-shep.net</text>
  </svg>

  <button class="replay" onclick="replay()">↺ REPLAY</button>
</div>

<script>
function replay(){
  const stage=document.querySelector('.stage');
  const btn=document.querySelector('.replay');
  btn.style.display='none';
  const clone=stage.cloneNode(true);
  clone.querySelector('.replay').onclick=replay;
  stage.parentNode.replaceChild(clone,stage);
}
</script>
</body>
</html>
